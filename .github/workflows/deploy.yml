name: Publish and deploy web app

on:
  schedule:
    # daily at 06:00 UTC (after US markets close, giving Yahoo time to update)
    - cron: "0 6 * * *"
  workflow_dispatch: # manual trigger for first run and testing

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate data.json and fixtures.json
        run: python web/publish.py

      - name: Run parity test
        run: node web/test_parity.js

      - name: Assemble deploy directory
        run: |
          mkdir -p _site
          cp web/index.html _site/
          cp web/core.js _site/
          cp web/data.json _site/
          cp web/favicon.svg _site/

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
